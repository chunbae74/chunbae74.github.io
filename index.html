<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" id="page-description" content="Academic CV" />
  <title id="page-title">Academic CV</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       NAVIGATION — content filled from data.json > meta
  ═══════════════════════════════════════════════════════ -->
  <nav class="global-nav" id="global-nav" aria-label="Main navigation">
    <div class="nav-inner">

      <a class="nav-logo" href="#hero" id="nav-logo"></a>

      <ul class="nav-links" id="nav-links" role="list">
        <li><a href="#about"      class="nav-link">About</a></li>
        <li><a href="#education"  class="nav-link">학력</a></li>
        <li><a href="#research"   class="nav-link">연구</a></li>
        <li><a href="#projects"   class="nav-link">프로젝트</a></li>
        <li><a href="#experience" class="nav-link">활동</a></li>
        <li><a href="#awards"     class="nav-link">수상</a></li>
        <li><a href="#contact"    class="nav-link">연락처</a></li>
      </ul>

      <div class="nav-actions">
        <button class="nav-hamburger" id="nav-hamburger"
                aria-label="Open navigation menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>

    </div>
  </nav>

  <!-- Mobile drawer -->
  <div class="nav-mobile-drawer" id="nav-mobile-drawer" aria-hidden="true">
    <ul role="list">
      <li><a href="#about">About</a></li>
      <li><a href="#education">학력</a></li>
      <li><a href="#research">연구</a></li>
      <li><a href="#projects">프로젝트</a></li>
      <li><a href="#experience">활동</a></li>
      <li><a href="#awards">수상</a></li>
      <li><a href="#contact">연락처</a></li>
    </ul>
  </div>

  <main id="main">

    <!-- ═══════════════════════════════════════════════════════
         HERO — filled from data.json > meta
    ═══════════════════════════════════════════════════════ -->
    <section id="hero" class="section section-light section-hero">
      <div class="container container-narrow">
        <div class="hero-layout">

          <div id="hero-avatar-wrap"></div>

          <div class="hero-content">
            <h1 class="hero-name"    id="hero-name"></h1>
            <p  class="hero-title"   id="hero-title"></p>
            <p  class="hero-intro"   id="hero-intro"></p>
            <div class="hero-actions" id="hero-actions"></div>
          </div>

        </div>
      </div>
    </section>


    <!-- ═══════════════════════════════════════════════════════
         ABOUT — filled from data.json > about + meta
    ═══════════════════════════════════════════════════════ -->
    <section id="about" class="section section-parchment">
      <div class="container container-narrow">
        <h2 class="section-heading">About</h2>

        <p class="about-summary" id="about-summary"></p>

        <div class="about-block">
          <h3 class="about-block-label">Skills</h3>
          <div class="chip-group" id="about-skills"></div>
        </div>

        <div class="about-block">
          <h3 class="about-block-label">Research Interests</h3>
          <div class="chip-group" id="about-interests"></div>
        </div>

      </div>
    </section>


    <!-- ═══════════════════════════════════════════════════════
         EDUCATION — filled from data.json > education[]
    ═══════════════════════════════════════════════════════ -->
    <section id="education" class="section section-light">
      <div class="container container-narrow">
        <h2 class="section-heading">학력</h2>
        <div class="timeline" id="education-list"></div>
      </div>
    </section>


    <!-- ═══════════════════════════════════════════════════════
         RESEARCH — filled from data.json > publications[]
    ═══════════════════════════════════════════════════════ -->
    <section id="research" class="section section-dark">
      <div class="container container-narrow">
        <h2 class="section-heading on-dark">논문</h2>
        <div class="pub-list" id="pub-list"></div>
      </div>
    </section>


    <!-- ═══════════════════════════════════════════════════════
         PROJECTS — filled from data.json > projects[]
    ═══════════════════════════════════════════════════════ -->
    <section id="projects" class="section section-parchment">
      <div class="container container-narrow">
        <h2 class="section-heading">프로젝트</h2>
        <div class="project-grid" id="project-grid"></div>
      </div>
    </section>


    <!-- ═══════════════════════════════════════════════════════
         EXPERIENCE — filled from data.json > experience[]
    ═══════════════════════════════════════════════════════ -->
    <section id="experience" class="section section-light">
      <div class="container container-narrow">
        <h2 class="section-heading">활동</h2>
        <div class="timeline" id="experience-list"></div>
      </div>
    </section>


    <!-- ═══════════════════════════════════════════════════════
         AWARDS — filled from data.json > awards[]
    ═══════════════════════════════════════════════════════ -->
    <section id="awards" class="section section-parchment">
      <div class="container container-narrow">
        <h2 class="section-heading">수상</h2>
        <div class="awards-list" id="awards-list"></div>
      </div>
    </section>


    <!-- ═══════════════════════════════════════════════════════
         CONTACT — filled from data.json > meta
    ═══════════════════════════════════════════════════════ -->
    <section id="contact" class="section section-dark section-contact">
      <div class="container container-narrow">
        <h2 class="section-heading on-dark">Let's Connect</h2>
        <p  class="contact-lead on-dark" id="contact-lead"></p>
        <div class="contact-grid"  id="contact-grid"></div>
        <div class="contact-links" id="contact-links"></div>
      </div>
    </section>

  </main>


  <!-- ═══════════════════════════════════════════════════════
       FOOTER — name filled from data.json > meta
  ═══════════════════════════════════════════════════════ -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p class="footer-copy">
        © <span id="footer-year"></span> <span id="footer-name"></span>.
        Built with plain HTML, CSS &amp; JavaScript.
      </p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
